
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DumbTube Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <h1>DumbTube</h1>
  <input id="searchInput" placeholder="Buscar vídeos...">
  <button id="searchBtn">Buscar</button>
</header>

<section class="player-area">
  <iframe id="player"
    allow="autoplay; encrypted-media"
    allowfullscreen
    loading="lazy">
  </iframe>
</section>

<section class="rows">

<h2>Resultados</h2>
<div id="resultsRow" class="row"></div>

</section>

<script src="app.js"></script>

</body>
</html>
