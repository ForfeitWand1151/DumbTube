<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Focus</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff0000">
<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#0f0f0f;
  color:white;
}
header{
  padding:12px;
  background:#202020;
  display:flex;
  gap:8px;
}
input{
  flex:1;
  padding:10px;
  border-radius:6px;
  border:none;
  font-size:16px;
}
button{
  padding:10px 16px;
  border:none;
  border-radius:6px;
  background:#ff0000;
  color:white;
  font-weight:bold;
}
#results{
  padding:12px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:12px;
}
.card{
  background:#1a1a1a;
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
}
.card img{
  width:100%;
}
.card div{
  padding:8px;
  font-size:14px;
}
#player{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:black;
  padding:10px;
}
iframe{
  width:100%;
  height:200px;
}
</style>
</head>

<body>

<header>
<input id="search" placeholder="Buscar vídeos longos...">
<button onclick="search()">Buscar</button>
</header>

<div id="results"></div>

<div id="player" style="display:none">
<iframe id="video" allowfullscreen></iframe>
</div>

<script src="app.js"></script>

</body>
</html>
